<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go + sqlc API</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 1rem; }
        h2 { color: #555; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .status { padding: 0.75rem; border-radius: 6px; margin: 0.5rem 0; }
        .status.healthy { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .btn {
            background: #667eea; color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
            margin-right: 0.5rem; margin-top: 0.5rem;
        }
        .btn:hover { background: #5a6fd6; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        input, textarea {
            width: 100%; padding: 0.5rem; margin: 0.25rem 0;
            border: 1px solid #ddd; border-radius: 4px;
        }
        .user-list { margin-top: 1rem; }
        .user-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem; background: #f8f9fa; border-radius: 6px; margin: 0.5rem 0;
        }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚀 Go + sqlc + PostgreSQL</h1>
            <div id="health" class="status">Checking connection...</div>
            <button class="btn" onclick="checkHealth()">Refresh</button>
        </div>

        <div class="card">
            <h2>Create User</h2>
            <input type="text" id="name" placeholder="Name">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="createUser()">Create User</button>
        </div>

        <div class="card">
            <h2>Users</h2>
            <button class="btn" onclick="loadUsers()">Load Users</button>
            <div id="users" class="user-list"></div>
        </div>

        <div class="card">
            <h2>API Response</h2>
            <pre id="response">Click a button to see the response...</pre>
        </div>
    </div>

    <script>
        const API = '/api';

        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                document.getElementById('health').className = 'status healthy';
                document.getElementById('health').textContent = 
                    `✓ Connected | Conns: ${data.total_conns}/${data.max_conns} | Idle: ${data.idle_conns}`;
                showResponse(data);
            } catch (e) {
                document.getElementById('health').className = 'status error';
                document.getElementById('health').textContent = '✗ Connection failed';
            }
        }

        async function createUser() {
            const user = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            try {
                const res = await fetch(`${API}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });
                const data = await res.json();
                showResponse(data);
                loadUsers();
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            } catch (e) {
                showResponse({ error: e.message });
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`);
                const users = await res.json();
                showResponse(users);
                
                const html = users.map(u => `
                    <div class="user-item">
                        <span><strong>${u.name}</strong> (${u.email})</span>
                        <button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button>
                    </div>
                `).join('');
                document.getElementById('users').innerHTML = html || '<p>No users found</p>';
            } catch (e) {
                showResponse({ error: e.message });
            }
        }

        async function deleteUser(id) {
            try {
                await fetch(`${API}/users/${id}`, { method: 'DELETE' });
                loadUsers();
                showResponse({ message: `User ${id} deleted` });
            } catch (e) {
                showResponse({ error: e.message });
            }
        }

        function showResponse(data) {
            document.getElementById('response').textContent = JSON.stringify(data, null, 2);
        }

        checkHealth();
    </script>
</body>
</html>
